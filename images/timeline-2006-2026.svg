<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="line" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#5e2ca5"/>
      <stop offset="1" stop-color="#f6b40e"/>
    </linearGradient>
  </defs>

  <text x="550" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a2e">Cadrage suisse de la désinstitutionnalisation</text>
  <text x="550" y="62" text-anchor="middle" font-size="13" fill="#666">De l'adoption de la CDPH au contre-projet du Conseil fédéral</text>

  <!-- Ligne de temps -->
  <line x1="80" y1="240" x2="1020" y2="240" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>

  <!-- Points + labels (alternés au-dessus / en-dessous) -->
  <!-- 2006 -->
  <g>
    <circle cx="100" cy="240" r="9" fill="#5e2ca5" stroke="white" stroke-width="3"/>
    <line x1="100" y1="240" x2="100" y2="170" stroke="#5e2ca5" stroke-width="1.5" stroke-dasharray="3,3"/>
    <rect x="40" y="100" width="120" height="60" rx="6" fill="#f7f5fb" stroke="#5e2ca5"/>
    <text x="100" y="120" text-anchor="middle" font-weight="700" font-size="14" fill="#5e2ca5">2006</text>
    <text x="100" y="138" text-anchor="middle" font-size="10">Adoption CDPH</text>
    <text x="100" y="152" text-anchor="middle" font-size="10">par l'ONU</text>
  </g>

  <!-- 2012 -->
  <g>
    <circle cx="240" cy="240" r="9" fill="#5e2ca5" stroke="white" stroke-width="3"/>
    <line x1="240" y1="240" x2="240" y2="310" stroke="#5e2ca5" stroke-width="1.5" stroke-dasharray="3,3"/>
    <rect x="180" y="320" width="120" height="60" rx="6" fill="#f7f5fb" stroke="#5e2ca5"/>
    <text x="240" y="340" text-anchor="middle" font-weight="700" font-size="14" fill="#5e2ca5">2012</text>
    <text x="240" y="358" text-anchor="middle" font-size="10">Contribution</text>
    <text x="240" y="372" text-anchor="middle" font-size="10">d'assistance AI</text>
  </g>

  <!-- 2014 -->
  <g>
    <circle cx="370" cy="240" r="9" fill="#5e2ca5" stroke="white" stroke-width="3"/>
    <line x1="370" y1="240" x2="370" y2="170" stroke="#5e2ca5" stroke-width="1.5" stroke-dasharray="3,3"/>
    <rect x="310" y="100" width="120" height="60" rx="6" fill="#f7f5fb" stroke="#5e2ca5"/>
    <text x="370" y="120" text-anchor="middle" font-weight="700" font-size="14" fill="#5e2ca5">2014</text>
    <text x="370" y="138" text-anchor="middle" font-size="10">Ratification CDPH</text>
    <text x="370" y="152" text-anchor="middle" font-size="10">par la Suisse</text>
  </g>

  <!-- 2022 -->
  <g>
    <circle cx="540" cy="240" r="10" fill="#f6b40e" stroke="#5e2ca5" stroke-width="3"/>
    <line x1="540" y1="240" x2="540" y2="310" stroke="#5e2ca5" stroke-width="1.5" stroke-dasharray="3,3"/>
    <rect x="470" y="320" width="140" height="60" rx="6" fill="#fff8e6" stroke="#b8860b"/>
    <text x="540" y="340" text-anchor="middle" font-weight="700" font-size="14" fill="#b8860b">2022</text>
    <text x="540" y="358" text-anchor="middle" font-size="10">Observations ONU CDPH</text>
    <text x="540" y="372" text-anchor="middle" font-size="10">sur la Suisse (80+ recos)</text>
  </g>

  <!-- 2023 -->
  <g>
    <circle cx="680" cy="240" r="9" fill="#5e2ca5" stroke="white" stroke-width="3"/>
    <line x1="680" y1="240" x2="680" y2="170" stroke="#5e2ca5" stroke-width="1.5" stroke-dasharray="3,3"/>
    <rect x="620" y="100" width="120" height="60" rx="6" fill="#f7f5fb" stroke="#5e2ca5"/>
    <text x="680" y="120" text-anchor="middle" font-weight="700" font-size="14" fill="#5e2ca5">2023</text>
    <text x="680" y="138" text-anchor="middle" font-size="10">Plan cantonal</text>
    <text x="680" y="152" text-anchor="middle" font-size="10">CDPH Genève vol.1</text>
  </g>

  <!-- 2024 -->
  <g>
    <circle cx="820" cy="240" r="10" fill="#f6b40e" stroke="#5e2ca5" stroke-width="3"/>
    <line x1="820" y1="240" x2="820" y2="310" stroke="#5e2ca5" stroke-width="1.5" stroke-dasharray="3,3"/>
    <rect x="745" y="320" width="150" height="74" rx="6" fill="#fff8e6" stroke="#b8860b"/>
    <text x="820" y="340" text-anchor="middle" font-weight="700" font-size="14" fill="#b8860b">2024</text>
    <text x="820" y="357" text-anchor="middle" font-size="10">Avant-projet LED-H</text>
    <text x="820" y="371" text-anchor="middle" font-size="10">Initiative Pour l'inclusion</text>
    <text x="820" y="385" text-anchor="middle" font-size="10">(107 910 signatures)</text>
  </g>

  <!-- 2026 -->
  <g>
    <circle cx="970" cy="240" r="10" fill="#f6b40e" stroke="#5e2ca5" stroke-width="3"/>
    <line x1="970" y1="240" x2="970" y2="170" stroke="#5e2ca5" stroke-width="1.5" stroke-dasharray="3,3"/>
    <rect x="900" y="100" width="140" height="60" rx="6" fill="#fff8e6" stroke="#b8860b"/>
    <text x="970" y="120" text-anchor="middle" font-weight="700" font-size="14" fill="#b8860b">2026</text>
    <text x="970" y="138" text-anchor="middle" font-size="10">Contre-projet du</text>
    <text x="970" y="152" text-anchor="middle" font-size="10">Conseil fédéral (25 fév.)</text>
  </g>

  <text x="550" y="460" text-anchor="middle" font-size="12" fill="#666" font-style="italic">Marges concrètes pour le travail social : connaître les outils, mobiliser les recours, soutenir l'effectivité des droits</text>
  <text x="550" y="488" text-anchor="middle" font-size="10" fill="#999" font-style="italic">Pierre Brasseur · HETS Genève · 2026</text>
</svg>
